<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KBAI Admin</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
      th { background: #f0f0f0; }
      .badge { padding: 2px 6px; border-radius: 4px; color: white; font-size: 12px; }
      .active { background: #2e7d32; }
      .inactive { background: #c62828; }
    </style>
  </head>
  <body>
    <h1>Knowledge Base AI - Admin</h1>
    <p>Recent Requests</p>
    <table>
      <thead>
        <tr>
          <th>Time (UTC)</th>
          <th>Trace</th>
          <th>IP</th>
          <th>Method</th>
          <th>Path</th>
          <th>Status</th>
          <th>Latency</th>
        </tr>
      </thead>
      <tbody>
        {% for r in logs %}
        <tr>
          <td>{{ r.ts }}</td>
          <td style="font-family:monospace">{{ r.trace_id }}</td>
          <td>{{ r.ip }}</td>
          <td>{{ r.method }}</td>
          <td>{{ r.path }}</td>
          <td>{{ r.status }}</td>
          <td>{{ r.latency_ms }} ms</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
